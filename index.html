
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProBuild | AI Resume Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700&family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f1f5f9; 
            color: #1e293b; 
            min-height: 100vh;
            margin: 0;
        }
        
        .main-wrapper { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; }
        .editor-section { padding: 1.5rem 1rem; width: 100%; }
        
        /* Preview Styling */
        .preview-section { 
            width: 100%;
            background: #cbd5e1; 
            padding: 3rem 1rem; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 2rem;
            border-top: 2px solid #94a3b8;
            margin-top: 2rem;
        }

        .resume-page {
            width: 210mm;
            min-height: 297mm;
            background: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            padding: 15mm 20mm;
            color: #1e293b;
            line-height: 1.5;
            position: relative;
            margin-bottom: 2rem;
            flex-shrink: 0;
        }

        /* Mobile Scale for Preview */
        @media screen and (max-width: 230mm) {
            .resume-page {
                transform: scale(calc((100vw - 40px) / 210mm)); 
                transform-origin: top center;
                margin-bottom: calc(297mm * (1 - (100vw - 40px) / 210mm) * -1 + 20px);
            }
        }

        /* Rendering Helper - Hidden */
        #render-temp {
            position: absolute;
            left: -9999px;
            top: 0;
            width: 210mm;
            padding: 15mm 20mm;
            background: white;
            visibility: hidden;
            min-height: 297mm;
        }

        /* Theme Styling */
        .theme-modern .section-title { 
            font-weight: 800; color: #2563eb; border-bottom: 2px solid #eff6ff; 
            margin: 1.2rem 0 0.6rem; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.12em; 
        }
        .theme-modern h1 { font-weight: 800; font-size: 2.5rem; color: #0f172a; line-height: 1; letter-spacing: -0.04em; margin-bottom: 0.3rem; }
        
        .theme-executive { font-family: 'Lora', serif; }
        .theme-executive .section-title { 
            font-family: 'Playfair Display', serif; font-size: 1.1rem; color: #854d0e; 
            border-bottom: 1px solid #ca8a04; margin: 1.5rem 0 0.8rem; text-align: center; 
        }
        .theme-executive h1 { color: #422006; text-align: center; font-size: 2.8rem; font-family: 'Playfair Display', serif; margin-bottom: 0.4rem; }

        /* UI Elements */
        .glass-card { background: white; border: 1px solid #e2e8f0; border-radius: 16px; padding: 1.25rem; }
        .input-group label { display: block; font-size: 0.7rem; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 0.4rem; }
        .input-styled { width: 100%; padding: 0.75rem; border: 1.5px solid #cbd5e1; border-radius: 10px; font-size: 0.9rem; transition: all 0.2s; }
        .input-styled:focus { border-color: #2563eb; outline: none; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        .btn-primary { background: #2563eb; color: white; padding: 0.7rem 1.4rem; border-radius: 10px; font-weight: 700; font-size: 0.85rem; }

        .violet-signature { color: #8b5cf6; font-weight: 700; font-size: 0.75rem; display: flex; align-items: center; gap: 4px; }

        @media print {
            .no-print { display: none !important; }
            body { background: white !important; }
            .preview-section { padding: 0 !important; background: white !important; display: block !important; margin: 0 !important; }
            .resume-page { box-shadow: none !important; margin: 0 !important; transform: none !important; width: 210mm !important; }
        }
    </style>
</head>
<body>

    <header class="no-print bg-white/95 backdrop-blur-md border-b border-slate-200 px-4 sm:px-8 py-4 flex flex-wrap justify-between items-center sticky top-0 z-50 gap-4">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg text-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
            </div>
            <div>
                <h1 class="text-lg font-black tracking-tighter text-slate-800">PROBUILD <span class="text-blue-600 italic text-sm">AI</span></h1>
                <span class="violet-signature">(By Sathish 💜)</span>
            </div>
        </div>
        
        <div class="flex items-center gap-2 w-full sm:w-auto">
            <select id="themeDropdown" onchange="state.currentTheme = this.value; updatePreview();" class="flex-1 sm:flex-none bg-slate-100 rounded-lg px-3 py-2 text-xs font-bold outline-none">
                <option value="theme-modern">✨ MODERN</option>
                <option value="theme-executive">🎩 EXECUTIVE</option>
            </select>
            <button onclick="downloadAsImage()" class="bg-violet-600 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-violet-700 transition">IMAGE</button>
            <button onclick="window.print()" class="btn-primary hover:bg-blue-700 transition shadow-sm">PDF</button>
        </div>
    </header>

    <div class="main-wrapper">
        <div class="editor-section">
            <div class="space-y-6">
                <!-- Score Card -->
                <div class="glass-card bg-slate-900 text-white flex flex-col sm:flex-row items-center justify-between gap-4">
                    <div>
                        <p class="text-[9px] uppercase font-bold text-blue-400">ATS Match Score</p>
                        <h2 class="text-4xl font-black text-blue-50"><span id="scoreText">0</span><span class="text-sm text-slate-500 ml-1">/100</span></h2>
                    </div>
                    <div id="optimizationList" class="flex flex-wrap gap-2 justify-center"></div>
                </div>

                <!-- Basic Info -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <section class="glass-card">
                        <h3 class="input-group label text-blue-600 mb-4">Identity & Contact</h3>
                        <div class="space-y-4">
                            <input type="text" data-field="name" placeholder="Full Name" class="input-styled">
                            <input type="text" data-field="title" placeholder="Professional Title" class="input-styled">
                            <div class="grid grid-cols-2 gap-3">
                                <input type="email" data-field="email" placeholder="Email" class="input-styled">
                                <input type="text" data-field="phone" placeholder="Phone" class="input-styled">
                            </div>
                            <div class="grid grid-cols-3 gap-3">
                                <input type="text" data-field="linkedin" placeholder="LinkedIn" class="input-styled text-xs">
                                <input type="text" data-field="github" placeholder="GitHub" class="input-styled text-xs">
                                <input type="text" data-field="portfolio" placeholder="Portfolio" class="input-styled text-xs">
                            </div>
                        </div>
                    </section>

                    <section class="glass-card flex flex-col">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="input-group label text-blue-600 m-0">AI Summary</h3>
                            <button onclick="generateAISummary()" id="aiBtn" class="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-[10px] font-bold">✨ AI ASSIST</button>
                        </div>
                        <textarea id="summaryTextarea" data-field="summary" class="input-styled flex-grow text-xs leading-relaxed" placeholder="Briefly describe your professional background..."></textarea>
                    </section>
                </div>

                <!-- Work & Projects -->
                <div class="grid grid-cols-1 gap-6">
                    <section class="glass-card">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="input-group label text-blue-600 m-0">Experience</h3>
                            <button onclick="addEntry('experience')" class="text-blue-600 text-[10px] font-bold border border-blue-100 px-3 py-1 rounded-lg">+ ADD WORK</button>
                        </div>
                        <div id="experienceInputs" class="space-y-4"></div>
                    </section>

                    <section class="glass-card">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="input-group label text-blue-600 m-0">Projects</h3>
                            <button onclick="addEntry('projects')" class="text-blue-600 text-[10px] font-bold border border-blue-100 px-3 py-1 rounded-lg">+ ADD PROJECT</button>
                        </div>
                        <div id="projectsInputs" class="space-y-4"></div>
                    </section>
                </div>

                <!-- Skills & Education -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <section class="glass-card">
                        <h3 class="input-group label text-blue-600 mb-4">Skills</h3>
                        <input type="text" id="skillsInput" placeholder="Skill 1, Skill 2, Skill 3..." class="input-styled">
                    </section>
                    <section class="glass-card">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="input-group label text-blue-600 m-0">Education</h3>
                            <button onclick="addEntry('education')" class="text-blue-600 text-[10px] font-bold border border-blue-100 px-3 py-1 rounded-lg">+ ADD EDUCATION</button>
                        </div>
                        <div id="educationInputs" class="space-y-4"></div>
                    </section>
                </div>
            </div>
        </div>

        <!-- Preview Section -->
        <div class="preview-section no-print">
            <div class="text-center">
                <h2 class="text-slate-500 font-black text-[10px] uppercase tracking-[0.4em] mb-1">Live Render Preview</h2>
                <p class="text-slate-400 text-[10px] italic">Updates as you type</p>
            </div>
            <div id="preview-pane" class="w-full flex flex-col items-center"></div>
        </div>
    </div>

    <!-- For calculation -->
    <div id="render-temp"></div>

    <script>
        const apiKey = "";
        const state = {
            personal: { name: '', title: '', email: '', phone: '', summary: '', linkedin: '', github: '', portfolio: '' },
            experience: [],
            projects: [],
            education: [],
            skills: [],
            currentTheme: 'theme-modern'
        };

        const scoreWeights = [
            { id: 'name', label: 'Name', val: 5, check: () => !!state.personal.name },
            { id: 'cont', label: 'Contact', val: 10, check: () => state.personal.email && state.personal.phone },
            { id: 'summ', label: 'Summary', val: 15, check: () => state.personal.summary.length > 50 },
            { id: 'exp', label: 'Work', val: 25, check: () => state.experience.length >= 1 },
            { id: 'proj', label: 'Projects', val: 20, check: () => state.projects.length >= 1 },
            { id: 'skill', label: 'Skills', val: 25, check: () => state.skills.length >= 4 }
        ];

        window.onload = () => {
            document.querySelectorAll('[data-field]').forEach(el => {
                el.addEventListener('input', e => {
                    state.personal[e.target.dataset.field] = e.target.value;
                    updatePreview();
                });
            });
            document.getElementById('skillsInput').addEventListener('input', e => {
                state.skills = e.target.value.split(',').map(s => s.trim()).filter(s => s);
                updatePreview();
            });
            updatePreview();
        };

        function addEntry(type) {
            const id = Date.now();
            if (type === 'experience') state.experience.push({ id, company: '', role: '', desc: '' });
            else if (type === 'projects') state.projects.push({ id, name: '', link: '', desc: '' });
            else state.education.push({ id, school: '', degree: '', year: '' });
            renderInputs();
            updatePreview();
        }

        function handleInput(type, id, field, val) {
            const item = state[type].find(i => i.id === id);
            if (item) { item[field] = val; updatePreview(); }
        }

        function removeEntry(type, id) {
            state[type] = state[type].filter(i => i.id !== id);
            renderInputs();
            updatePreview();
        }

        function renderInputs() {
            ['experience', 'projects', 'education'].forEach(type => {
                const container = document.getElementById(`${type}Inputs`);
                container.innerHTML = '';
                state[type].forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'p-4 bg-slate-50 border border-slate-200 rounded-xl relative';
                    
                    let inputs = '';
                    if (type === 'experience') {
                        inputs = `<input placeholder="Company" value="${item.company}" oninput="handleInput('experience', ${item.id}, 'company', this.value)" class="input-styled mb-2">
                                  <input placeholder="Role" value="${item.role}" oninput="handleInput('experience', ${item.id}, 'role', this.value)" class="input-styled mb-2">
                                  <textarea placeholder="Bullet points..." oninput="handleInput('experience', ${item.id}, 'desc', this.value)" class="input-styled h-20 text-xs">${item.desc}</textarea>`;
                    } else if (type === 'projects') {
                        inputs = `<input placeholder="Project Name" value="${item.name}" oninput="handleInput('projects', ${item.id}, 'name', this.value)" class="input-styled mb-2">
                                  <input placeholder="Link (Github/Live)" value="${item.link}" oninput="handleInput('projects', ${item.id}, 'link', this.value)" class="input-styled mb-2">
                                  <textarea placeholder="What did you build?" oninput="handleInput('projects', ${item.id}, 'desc', this.value)" class="input-styled h-20 text-xs">${item.desc}</textarea>`;
                    } else {
                        inputs = `<input placeholder="School" value="${item.school}" oninput="handleInput('education', ${item.id}, 'school', this.value)" class="input-styled mb-2">
                                  <div class="grid grid-cols-2 gap-2">
                                    <input placeholder="Degree" value="${item.degree}" oninput="handleInput('education', ${item.id}, 'degree', this.value)" class="input-styled">
                                    <input placeholder="Year" value="${item.year}" oninput="handleInput('education', ${item.id}, 'year', this.value)" class="input-styled">
                                  </div>`;
                    }
                    
                    div.innerHTML = inputs + `<button onclick="removeEntry('${type}', ${item.id})" class="absolute top-2 right-2 text-slate-400 hover:text-red-500">×</button>`;
                    container.appendChild(div);
                });
            });
        }

        async function generateAISummary() {
            const btn = document.getElementById('aiBtn');
            const role = state.personal.title;
            if (!role) return;
            btn.innerText = "WAIT...";
            try {
                const prompt = `Write a 2-sentence professional resume summary for a ${role} with these skills: ${state.skills.join(', ')}. No intro or outro.`;
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const d = await res.json();
                const txt = d.candidates[0].content.parts[0].text.trim();
                state.personal.summary = txt;
                document.getElementById('summaryTextarea').value = txt;
                updatePreview();
            } catch (e) {}
            btn.innerText = "✨ AI ASSIST";
        }

        function createPage(num) {
            const page = document.createElement('div');
            page.className = `resume-page ${state.currentTheme}`;
            page.innerHTML = `<div class="content-flow"></div><div class="absolute bottom-4 right-8 text-[8px] font-bold opacity-20 no-print">P.${num}</div>`;
            return page;
        }

        function updatePreview() {
            const previewPane = document.getElementById('preview-pane');
            const renderTemp = document.getElementById('render-temp');
            renderTemp.className = `resume-page ${state.currentTheme}`;
            previewPane.innerHTML = '';
            
            let currentPage = createPage(1);
            previewPane.appendChild(currentPage);
            let flow = currentPage.querySelector('.content-flow');

            // Header Content
            const header = `
                <div class="mb-6">
                    <h1 class="uppercase">${state.personal.name || 'Your Name'}</h1>
                    <div class="text-blue-600 font-bold text-lg uppercase tracking-tight">${state.personal.title || 'Profession'}</div>
                    <div class="flex flex-wrap gap-x-4 text-[10px] mt-2 opacity-60 font-bold uppercase tracking-widest">
                        ${[state.personal.email, state.personal.phone].filter(Boolean).join(' • ')}
                    </div>
                    <div class="flex flex-wrap gap-x-3 text-[9px] mt-1 font-bold text-blue-500">
                        ${[state.personal.linkedin, state.personal.github, state.personal.portfolio].filter(Boolean).join(' | ')}
                    </div>
                </div>
            `;
            flow.innerHTML = header;

            const sections = [];
            if (state.personal.summary) sections.push({ title: 'Profile', html: `<p class="text-[11px] text-slate-700 leading-relaxed">${state.personal.summary}</p>` });
            
            if (state.experience.length) {
                let expHtml = '';
                state.experience.forEach(e => {
                    expHtml += `<div class="mb-4">
                        <div class="flex justify-between font-bold text-[12px]"><span class="text-slate-900">${e.role || 'Role'}</span><span class="text-blue-600">${e.company || 'Company'}</span></div>
                        <div class="text-[10px] text-slate-600 whitespace-pre-line leading-relaxed mt-1">${e.desc || ''}</div>
                    </div>`;
                });
                sections.push({ title: 'Professional Experience', html: expHtml });
            }

            if (state.projects.length) {
                let projHtml = '';
                state.projects.forEach(p => {
                    projHtml += `<div class="mb-4">
                        <div class="flex justify-between font-bold text-[12px]"><span>${p.name || 'Project Name'}</span><span class="text-blue-500 font-normal text-[10px] italic">${p.link || ''}</span></div>
                        <div class="text-[10px] text-slate-600 mt-1">${p.desc || ''}</div>
                    </div>`;
                });
                sections.push({ title: 'Selected Projects', html: projHtml });
            }

            if (state.skills.length) {
                sections.push({ title: 'Technical Skills', html: `<div class="flex flex-wrap gap-2">${state.skills.map(s => `<span class="bg-slate-50 border border-slate-200 px-2 py-0.5 rounded-md text-[9px] font-bold text-slate-600 uppercase">${s}</span>`).join('')}</div>` });
            }

            if (state.education.length) {
                let edHtml = '';
                state.education.forEach(e => {
                    edHtml += `<div class="mb-3">
                        <div class="flex justify-between font-bold text-[11px]"><span>${e.degree || 'Degree'}</span><span class="opacity-50">${e.year || ''}</span></div>
                        <div class="text-[10px] uppercase tracking-wide text-slate-500 font-bold">${e.school || 'University'}</div>
                    </div>`;
                });
                sections.push({ title: 'Education', html: edHtml });
            }

            // Continuous Flow Logic
            sections.forEach(sec => {
                const wrap = document.createElement('div');
                wrap.innerHTML = `<div class="section-title">${sec.title}</div>` + sec.html;
                
                // Test height
                renderTemp.innerHTML = flow.innerHTML + wrap.outerHTML;
                const pageHeightLimit = 1000; // Physical pixel height roughly for A4 content
                
                if (renderTemp.scrollHeight > pageHeightLimit) {
                    currentPage = createPage(previewPane.children.length + 1);
                    previewPane.appendChild(currentPage);
                    flow = currentPage.querySelector('.content-flow');
                }
                flow.innerHTML += wrap.outerHTML;
            });

            // Score update
            let total = 0;
            const list = document.getElementById('optimizationList');
            list.innerHTML = '';
            scoreWeights.forEach(w => {
                const ok = w.check();
                if (ok) total += w.val;
                list.innerHTML += `<div class="px-2 py-1 rounded-md text-[9px] font-bold ${ok ? 'bg-green-900 text-green-200' : 'bg-slate-800 text-slate-500'}">${w.label}</div>`;
            });
            document.getElementById('scoreText').innerText = total;
        }

        async function downloadAsImage() {
            const page = document.querySelector('.resume-page');
            const canvas = await html2canvas(page, { scale: 3 });
            const link = document.createElement('a');
            link.download = `Resume_${state.personal.name || 'ProBuild'}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
